<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>DrMax - Sistem de Programări, doctor 1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary: #6b9e7f;
        --secondary: #e8b4a0;
        --accent: #f5e6d3;
        --background: #ffffff;
        --foreground: #1a1a1a;
        --border: #e0e0e0;
        --muted: #999999;
      }

      body {
        font-family: 'Poppins', sans-serif;
        background-color: var(--background);
        color: var(--foreground);
        line-height: 1.6;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 1rem;
      }

      .header {
        background: linear-gradient(135deg, rgba(107, 158, 127, 0.2) 0%, rgba(232, 180, 160, 0.2) 100%);
        padding: 2rem 1rem;
        text-align: center;
        border-radius: 0 0 1.5rem 1.5rem;
        margin-bottom: 1.5rem;
      }

      .header h1 {
        font-size: 2.5rem;
        color: var(--foreground);
        margin-bottom: 0.5rem;
      }

      .header p {
        color: var(--muted);
        font-size: 1rem;
      }

      .button {
        background-color: var(--primary);
        color: white;
        border: none;
        padding: 0.75rem 1.5rem;
        border-radius: 0.5rem;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 600;
        transition: all 0.3s ease;
      }

      .button:hover {
        background-color: #5a8a6f;
        transform: translateY(-2px);
      }

      .button:active {
        transform: scale(0.95);
      }

      .button-danger {
        background-color: #dc3545;
      }

      .button-danger:hover {
        background-color: #c82333;
      }

      .button-group {
        display: flex;
        gap: 1rem;
        margin-bottom: 2rem;
        flex-wrap: wrap;
      }

      .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.4);
        animation: fadeIn 0.3s ease;
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      .modal.active {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .modal-content {
        background-color: var(--background);
        padding: 2rem;
        border-radius: 1rem;
        width: 90%;
        max-width: 500px;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        animation: slideUp 0.3s ease;
      }

      @keyframes slideUp {
        from {
          transform: translateY(50px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
      }

      .modal-header h2 {
        font-size: 1.5rem;
        color: var(--foreground);
      }

      .close-btn {
        background: none;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        color: var(--muted);
      }

      .form-group {
        margin-bottom: 1rem;
      }

      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        color: var(--foreground);
      }

      .form-group input,
      .form-group select,
      .form-group textarea {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid var(--border);
        border-radius: 0.5rem;
        font-family: 'Poppins', sans-serif;
        font-size: 1rem;
      }

      .form-group textarea {
        resize: vertical;
        min-height: 100px;
      }

      .form-group input:focus,
      .form-group select:focus,
      .form-group textarea:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(107, 158, 127, 0.1);
      }

      .appointments-list {
        display: grid;
        gap: 1rem;
      }

      .appointment-card {
        background-color: var(--accent);
        border: 1px solid var(--border);
        border-radius: 0.75rem;
        padding: 1.5rem;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 1rem;
      }

      .appointment-info {
        flex: 1;
      }

      .appointment-name {
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--foreground);
        margin-bottom: 0.5rem;
      }

      .appointment-detail {
        font-size: 0.9rem;
        color: var(--muted);
        margin-bottom: 0.25rem;
      }

      .appointment-actions {
        display: flex;
        gap: 0.5rem;
      }

      .delete-btn {
        background-color: #dc3545;
        color: white;
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 0.5rem;
        cursor: pointer;
        font-size: 0.9rem;
        transition: all 0.3s ease;
      }

      .delete-btn:hover {
        background-color: #c82333;
      }

      .empty-state {
        text-align: center;
        padding: 3rem 1rem;
        color: var(--muted);
      }

      .empty-state p {
        font-size: 1.1rem;
        margin-bottom: 0.5rem;
      }

      .loading {
        text-align: center;
        padding: 2rem;
        color: var(--muted);
      }

      .toast {
        position: fixed;
        bottom: 1rem;
        right: 1rem;
        padding: 1rem 1.5rem;
        border-radius: 0.5rem;
        color: white;
        font-weight: 600;
        animation: slideInUp 0.3s ease;
        z-index: 2000;
      }

      @keyframes slideInUp {
        from {
          transform: translateY(100px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .toast.success {
        background-color: #28a745;
      }

      .toast.error {
        background-color: #dc3545;
      }

      @media (max-width: 768px) {
        .header h1 {
          font-size: 2rem;
        }

        .appointment-card {
          flex-direction: column;
        }

        .button-group {
          flex-direction: column;
        }

        .button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>ArDental</h1>
      <p>Sistem de gestionare a programărilor</p>
    </div>

    <div class="container">
      <div class="button-group">
        <button class="button" onclick="openModal()">+ Adaugă Programare</button>
        <button class="button button-danger" onclick="deleteAll()">Șterge Toate</button>
      </div>

      <div id="appointmentsList" class="appointments-list">
        <div class="loading">Se încarcă...</div>
      </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Adaugă Programare</h2>
          <button class="close-btn" onclick="closeModal()">×</button>
        </div>

        <form id="appointmentForm" onsubmit="handleSubmit(event)">
          <div class="form-group">
            <label for="nume">Nume Pacient</label>
            <input type="text" id="nume" name="nume" required />
          </div>

          <div class="form-group">
            <label for="nrTelefon">Telefon</label>
            <input type="tel" id="nrTelefon" name="nrTelefon" placeholder="Ex: 40790 342 380" required />
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required />
          </div>

          <div class="form-group">
            <label for="data">Data Programării</label>
            <input type="date" id="data" name="data" required />
          </div>

          <div class="form-group">
            <label for="oraProgramarii">Ora Programării</label>
            <input type="time" id="oraProgramarii" name="oraProgramarii" required />
          </div>

          <div class="form-group">
            <label for="tipProgramare">Tip Programare</label>
            <select id="tipProgramare" name="tipProgramare" required>
              <option value="">Selectați tipul</option>
              <option value="Curățare dentară">Curățare dentară</option>
              <option value="Examinare generală">Examinare generală</option>
              <option value="Tratament carie">Tratament carie</option>
              <option value="Detartraj">Detartraj</option>
              <option value="Albire dentară">Albire dentară</option>
              <option value="Implant dentar">Implant dentar</option>
              <option value="Altele">Altele</option>
            </select>
          </div>

          <div class="form-group">
            <label for="notite">Note Speciale</label>
            <textarea id="notite" name="notite"></textarea>
          </div>

          <button type="submit" class="button" style="width: 100%;">Adaugă Programare</button>
        </form>
      </div>
    </div>

    <script>
      const API_URL = '/api';

      function openModal() {
        document.getElementById('modal').classList.add('active');
      }

      function closeModal() {
        document.getElementById('modal').classList.remove('active');
        document.getElementById('appointmentForm').reset();
      }

      function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = message;
        document.body.appendChild(toast);

        setTimeout(() => {
          toast.remove();
        }, 3000);
      }

      async function handleSubmit(event) {
        event.preventDefault();

        const formData = new FormData(event.target);
        const data = Object.fromEntries(formData);

        // Convert date format from YYYY-MM-DD to DD.MM.YYYY
        const [year, month, day] = data.data.split('-');
        data.data = `${day}.${month}.${year}`;

        try {
          const response = await fetch(`${API_URL}/appointments`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify(data),
          });

          if (!response.ok) {
            throw new Error('Failed to add appointment');
          }

          showToast('Programare adăugată și salvată în Google Sheets!', 'success');
          closeModal();
          loadAppointments();
        } catch (error) {
          console.error('Error:', error);
          showToast('Eroare la adăugarea programării', 'error');
        }
      }

      async function loadAppointments() {
        try {
          const response = await fetch(`${API_URL}/appointments`);
          if (!response.ok) {
            throw new Error('Failed to load appointments');
          }

          const appointments = await response.json();
          const container = document.getElementById('appointmentsList');

          if (appointments.length === 0) {
            container.innerHTML = `
              <div class="empty-state">
                <p>Nu sunt programări adăugate încă</p>
                <p style="font-size: 0.9rem;">Apăsați butonul de mai sus pentru a adăuga o programare</p>
              </div>
            `;
            return;
          }

          container.innerHTML = appointments
            .map(
              (apt) => `
            <div class="appointment-card">
              <div class="appointment-info">
                <div class="appointment-name">${apt.nume}</div>
                <div class="appointment-detail">📞 ${apt.nrTelefon}</div>
                <div class="appointment-detail">📧 ${apt.email}</div>
                <div class="appointment-detail">📅 ${apt.data} la ${apt.oraProgramarii}</div>
                <div class="appointment-detail">🏥 ${apt.tipProgramare}</div>
                ${apt.notite ? `<div class="appointment-detail">📝 ${apt.notite}</div>` : ''}
              </div>
              <div class="appointment-actions">
                <button class="delete-btn" onclick="deleteAppointment('${apt.id}')">Șterge</button>
              </div>
            </div>
          `
            )
            .join('');
        } catch (error) {
          console.error('Error loading appointments:', error);
          document.getElementById('appointmentsList').innerHTML =
            '<div class="empty-state"><p>Eroare la încărcarea programărilor</p></div>';
        }
      }

      async function deleteAppointment(id) {
        if (!confirm('Sunteți sigur că doriți să ștergeți această programare?')) {
          return;
        }

        try {
          const response = await fetch(`${API_URL}/appointments/${id}`, {
            method: 'DELETE',
          });

          if (!response.ok) {
            throw new Error('Failed to delete appointment');
          }

          showToast('Programare ștearsă', 'success');
          loadAppointments();
        } catch (error) {
          console.error('Error:', error);
          showToast('Eroare la ștergerea programării', 'error');
        }
      }

      async function deleteAll() {
        if (!confirm('Sunteți sigur că doriți să ștergeți TOATE programările?')) {
          return;
        }

        try {
          const response = await fetch(`${API_URL}/appointments`, {
            method: 'DELETE',
          });

          if (!response.ok) {
            throw new Error('Failed to delete all appointments');
          }

          showToast('Toate programările au fost șterse', 'success');
          loadAppointments();
        } catch (error) {
          console.error('Error:', error);
          showToast('Eroare la ștergerea programărilor', 'error');
        }
      }

      // Load appointments on page load
      loadAppointments();

      // Close modal when clicking outside
      window.onclick = function (event) {
        const modal = document.getElementById('modal');
        if (event.target === modal) {
          closeModal();
        }
      };
    </script>
  </body>
</html>
